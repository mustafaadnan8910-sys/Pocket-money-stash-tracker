<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pocket Money Stash Tracker</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --panel-bg: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary-glow: #38bdf8;
            --success-glow: #4ade80;
            --danger-glow: #f87171;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        .phone-container {
            width: 100%;
            max-width: 420px;
            height: 100vh;
            max-height: 850px;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        @media (max-width: 430px) {
            .phone-container {
                border-radius: 0;
                max-height: 100vh;
                border: none;
            }
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 24px;
            opacity: 0;
            pointer-events: none;
            transform: translateX(30px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .screen.active {
            opacity: 1;
            pointer-events: auto;
            transform: translateX(0);
        }

        /* Screen 0: Lock Screen Passcode System */
        .lock-title {
            font-size: 1.4rem;
            font-weight: 700;
            text-align: center;
            margin-top: 40px;
            margin-bottom: 10px;
        }
        
        .lock-subtitle {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 30px;
        }

        .dots-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .dot {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: var(--primary-glow);
            line-height: 0;
        }

        .dot.filled::before {
            content: '•';
        }

        /* Home Screen Card Layout */
        .header {
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .btn-utility {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-utility.danger {
            background: rgba(248, 113, 113, 0.1);
            border: 1px solid rgba(248, 113, 113, 0.2);
            color: var(--danger-glow);
        }

        .stash-card {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 24px;
            text-align: center;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3);
            margin-bottom: 24px;
            position: relative;
        }

        .stash-card::before {
            content: '';
            position: absolute;
            top: -1px; left: 10%; right: 10%; height: 1px;
            background: linear-gradient(90deg, transparent, var(--success-glow), transparent);
        }

        .stash-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .stash-amount {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--success-glow);
            text-shadow: 0 0 15px rgba(74, 222, 128, 0.3);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 24px;
        }

        .stat-box {
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 16px;
            text-align: center;
        }

        .stat-box .val {
            font-size: 1.2rem;
            font-weight: 700;
            margin-top: 4px;
        }

        /* History Log List */
        .history-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .section-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-right: 4px;
        }

        .history-item {
            background: rgba(30, 41, 59, 0.3);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .item-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .item-info .item-cat {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .item-info .item-date {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .item-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .item-amount {
            font-weight: 700;
            color: var(--danger-glow);
        }

        .btn-delete-item {
            background: none;
            border: none;
            color: rgba(248, 113, 113, 0.6);
            font-size: 1.1rem;
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Universal Action Buttons */
        .btn-action {
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 16px;
            padding: 16px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
            transition: opacity 0.2s;
        }

        .btn-action:active {
            opacity: 0.8;
        }

        .btn-back {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 0.95rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            margin-bottom: 20px;
            width: fit-content;
        }

        /* Forms / Inputs for Stash Modifier */
        .input-field {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 16px;
            font-size: 1.2rem;
            color: #fff;
            width: 100%;
            outline: none;
            margin-bottom: 20px;
        }

        /* Screen 2: Custom Keypad Layout */
        .input-display {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            text-align: right;
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 24px;
            color: var(--text-main);
            min-height: 80px;
        }

        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: auto;
            margin-bottom: 24px;
        }

        .key {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            border-radius: 16px;
            padding: 20px;
            font-size: 1.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.1s;
        }

        .key:active {
            background: rgba(255, 255, 255, 0.15);
        }

        .key.btn-clear {
            color: var(--danger-glow);
        }

        /* Screen 3: Category Selector Cards */
        .category-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }

        .cat-card {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px 16px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
        }

        .cat-card:active {
            transform: scale(0.97);
        }

        .cat-card.selected {
            border-color: var(--primary-glow);
            background: rgba(56, 189, 248, 0.15);
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.2);
        }

        .cat-icon {
            font-size: 2rem;
            margin-bottom: 8px;
        }

        .cat-title {
            font-size: 1rem;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="phone-container">
        
        <div id="screen-lock" class="screen active">
            <div class="lock-title">Enter Passcode</div>
            <div class="lock-subtitle" id="lock-msg">Default passcode is 1234</div>
            
            <div class="dots-container">
                <div id="dot-1" class="dot"></div>
                <div id="dot-2" class="dot"></div>
                <div id="dot-3" class="dot"></div>
                <div id="dot-4" class="dot"></div>
            </div>

            <div class="keypad" style="margin-bottom: 0;">
                <button class="key" onclick="pressLockKey('1')">1</button>
                <button class="key" onclick="pressLockKey('2')">2</button>
                <button class="key" onclick="pressLockKey('3')">3</button>
                <button class="key" onclick="pressLockKey('4')">4</button>
                <button class="key" onclick="pressLockKey('5')">5</button>
                <button class="key" onclick="pressLockKey('6')">6</button>
                <button class="key" onclick="pressLockKey('7')">7</button>
                <button class="key" onclick="pressLockKey('8')">8</button>
                <button class="key" onclick="pressLockKey('9')">9</button>
                <button class="key btn-clear" onclick="clearLockKey()">C</button>
                <button class="key" onclick="pressLockKey('0')">0</button>
                <div class="key" style="opacity: 0; pointer-events: none;"></div>
            </div>
        </div>
        
        <div id="screen-home" class="screen">
            <div class="header">
                <h1>Pocket Stash</h1>
                <div class="header-actions">
                    <button class="btn-utility" onclick="navigateTo('screen-settings')">⚙️ Setup</button>
                    <button class="btn-utility danger" onclick="resetAllData()">Wipe</button>
                </div>
            </div>
            
            <div class="stash-card">
                <div class="stash-label">Current Stash</div>
                <div class="stash-amount" id="display-stash">PKR 0</div>
            </div>

            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stash-label">Base Allowance</div>
                    <div class="val" style="color: #60a5fa;" id="display-allowance">PKR 5,000</div>
                </div>
                <div class="stat-box">
                    <div class="stash-label">Spent</div>
                    <div class="val" style="color: var(--danger-glow);" id="display-spent">PKR 0</div>
                </div>
            </div>

            <div class="history-section">
                <div class="section-title">Expense History</div>
                <div class="history-list" id="log-container"></div>
            </div>

            <button class="btn-action" style="margin-top: 16px;" onclick="navigateTo('screen-keypad')">
                ➕ Log Expense
            </button>
        </div>

        <div id="screen-settings" class="screen">
            <button class="btn-back" onclick="navigateTo('screen-home')">← Dashboard</button>
            
            <div class="section-title" style="margin-top: 10px;">Update Base Allowance Amount</div>
            <input type="number" class="input-field" id="input-new-allowance" placeholder="e.g. 3500">
            
            <div class="section-title">Change Secret 4-Digit Passcode</div>
            <input type="text" maxlength="4" pattern="[0-9]*" class="input-field" id="input-new-passcode" placeholder="e.g. 4321">
            
            <button class="btn-action" style="background: var(--success-glow); margin-top: auto;" onclick="applySettings()">
                Save Preferences
            </button>
        </div>

        <div id="screen-keypad" class="screen">
            <button class="btn-back" onclick="navigateTo('screen-home')">← Dashboard</button>
            <div class="section-title">Enter Amount (PKR)</div>
            <div class="input-display" id="keypad-display">0</div>

            <div class="keypad">
                <button class="key" onclick="pressNum('1')">1</button>
                <button class="key" onclick="pressNum('2')">2</button>
                <button class="key" onclick="pressNum('3')">3</button>
                <button class="key" onclick="pressNum('4')">4</button>
                <button class="key" onclick="pressNum('5')">5</button>
                <button class="key" onclick="pressNum('6')">6</button>
                <button class="key" onclick="pressNum('7')">7</button>
                <button class="key" onclick="pressNum('8')">8</button>
                <button class="key" onclick="pressNum('9')">9</button>
                <button class="key btn-clear" onclick="pressClear()">C</button>
                <button class="key" onclick="pressNum('0')">0</button>
                <button class="key" onclick="pressNum('00')">00</button>
            </div>

            <button class="btn-action" id="btn-next-step" onclick="goToCategories()">
                Next: Select Category →
            </button>
        </div>

        <div id="screen-category" class="screen">
            <button class="btn-back" onclick="navigateTo('screen-keypad')">← Change Amount</button>
            <div class="section-title" style="margin-bottom: 20px;">Choose Category</div>

            <div class="category-grid">
                <div class="cat-card" onclick="selectCategory('Food', '🍔')">
                    <div class="cat-icon">🍔</div>
                    <div class="cat-title">Food & Snacks</div>
                </div>
                <div class="cat-card" onclick="selectCategory('Gaming', '🎮')">
                    <div class="cat-icon">🎮</div>
                    <div class="cat-title">Gaming / Fun</div>
                </div>
                <div class="cat-card" onclick="selectCategory('Travel', '🚗')">
                    <div class="cat-icon">🚗</div>
                    <div class="cat-title">Transport</div>
                </div>
                <div class="cat-card" onclick="selectCategory('Other', '✨')">
                    <div class="cat-icon">✨</div>
                    <div class="cat-title">Misc Stuff</div>
                </div>
            </div>

            <button class="btn-action" style="background: var(--success-glow); box-shadow: 0 4px 12px rgba(74, 222, 128, 0.2);" onclick="saveExpense()">
                Confirm & Save Expense
            </button>
        </div>

    </div>

    <script>
        // SYSTEM STORAGE CONTROL CONFIG
        let appData = {
            allowance: 5000,
            passcode: "1234",
            expenses: []
        };

        let typedAmount = "0";
        let chosenCategory = "";
        let chosenIcon = "";
        let enteredPasscode = "";

        window.onload = function() {
            const saved = localStorage.getItem('pocketStashData');
            if (saved) {
                appData = JSON.parse(saved);
                // backward compatibility if security field not present
                if(!appData.passcode) appData.passcode = "1234";
            }
            document.getElementById('input-new-allowance').value = appData.allowance;
            document.getElementById('input-new-passcode').value = appData.passcode;
            updateDashboard();
        };

        function saveDataToDevice() {
            localStorage.setItem('pocketStashData', JSON.stringify(appData));
        }

        // Passcode Input Controls
        function pressLockKey(num) {
            if (enteredPasscode.length >= 4) return;
            enteredPasscode += num;
            
            // Visual Update to matching masking symbol
            document.getElementById(`dot-${enteredPasscode.length}`).classList.add('filled');

            if (enteredPasscode.length === 4) {
                setTimeout(() => {
                    if (enteredPasscode === appData.passcode) {
                        navigateTo('screen-home');
                        enteredPasscode = "";
                        resetLockDots();
                    } else {
                        document.getElementById('lock-msg').innerText = "Incorrect Code! Try Again.";
                        document.getElementById('lock-msg').style.color = "var(--danger-glow)";
                        enteredPasscode = "";
                        resetLockDots();
                    }
                }, 250);
            }
        }

        function clearLockKey() {
            enteredPasscode = "";
            resetLockDots();
        }

        function resetLockDots() {
            for (let i = 1; i <= 4; i++) {
                document.getElementById(`dot-${i}`).classList.remove('filled');
            }
        }

        // Settings Setup logic (Fix balance / code change)
        function applySettings() {
            const valAmt = document.getElementById('input-new-allowance').value;
            const valPass = document.getElementById('input-new-passcode').value;

            if (valAmt && parseInt(valAmt) >= 0) {
                appData.allowance = parseInt(valAmt);
            }
            if (valPass && valPass.length === 4) {
                appData.passcode = valPass;
            } else if (valPass && valPass.length !== 4) {
                alert("Passcode must be exactly 4 digits long!");
                return;
            }

            saveDataToDevice();
            updateDashboard();
            navigateTo('screen-home');
        }

        function navigateTo(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function updateDashboard() {
            let totalSpent = 0;
            appData.expenses.forEach(item => totalSpent += item.amount);
            let currentStash = appData.allowance - totalSpent;

            document.getElementById('display-stash').innerText = "PKR " + currentStash.toLocaleString();
            document.getElementById('display-spent').innerText = "PKR " + totalSpent.toLocaleString();
            document.getElementById('display-allowance').innerText = "PKR " + appData.allowance.toLocaleString();

            const container = document.getElementById('log-container');
            container.innerHTML = "";
            
            if(appData.expenses.length === 0) {
                container.innerHTML = `<div style="text-align:center; color:var(--text-muted); margin-top:20px; font-size:0.9rem;">No entries logged yet.</div>`;
                return;
            }

            [...appData.expenses].reverse().forEach((item, index) => {
                const realIndex = appData.expenses.length - 1 - index;
                const row = document.createElement('div');
                row.className = 'history-item';
                row.innerHTML = `
                    <div class="item-left">
                        <div class="item-info">
                            <div class="item-cat">${item.icon} ${item.category}</div>
                            <div class="item-date">${item.date}</div>
                        </div>
                    </div>
                    <div class="item-right">
                        <div class="item-amount">-Rs ${item.amount.toLocaleString()}</div>
                        <button class="btn-delete-item" onclick="deleteExpense(${realIndex})">✕</button>
                    </div>
                `;
                container.appendChild(row);
            });
        }

        function deleteExpense(index) {
            if (confirm("Delete this log?")) {
                appData.expenses.splice(index, 1);
                saveDataToDevice();
                updateDashboard();
            }
        }

        function resetAllData() {
            if (confirm("Reset everything back to defaults?")) {
                appData.expenses = [];
                appData.allowance = 5000;
                appData.passcode = "1234";
                document.getElementById('input-new-allowance').value = 5000;
                document.getElementById('input-new-passcode').value = "1234";
                saveDataToDevice();
                updateDashboard();
                navigateTo('screen-lock');
            }
        }

        // Expense keypad mechanics
        function pressNum(num) {
            if (typedAmount === "0") {
                if (num === "0" || num === "00") return;
                typedAmount = num;
            } else {
                typedAmount += num;
            }
            document.getElementById('keypad-display').innerText = parseInt(typedAmount).toLocaleString();
        }

        function pressClear() {
            typedAmount = "0";
            document.getElementById('keypad-display').innerText = "0";
        }

        function goToCategories() {
            if(parseInt(typedAmount) <= 0) {
                alert("Type an expense value!");
                return;
            }
            document.querySelectorAll('.cat-card').forEach(c => c.classList.remove('selected'));
            chosenCategory = "";
            navigateTo('screen-category');
        }

        function selectCategory(name, icon) {
            chosenCategory = name;
            chosenIcon = icon;
            document.querySelectorAll('.cat-card').forEach(c => c.classList.remove('selected'));
            event.currentTarget.classList.add('selected');
        }

        function saveExpense() {
            if(!chosenCategory) return;

            const newExpense = {
                amount: parseInt(typedAmount),
                category: chosenCategory,
                icon: chosenIcon,
                date: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute:'2-digit' })
            };

            appData.expenses.push(newExpense);
            saveDataToDevice();
            updateDashboard();
            pressClear();
            navigateTo('screen-home');
        }
    </script>
</body>
</html>
